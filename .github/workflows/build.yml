name: Build & Release

on:
  push:
    tags: ["v*"]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Compile (${{ matrix.target.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { label: "linux-x64",    flag: "bun-linux-x64",    out: "mcp-shell-bun-linux-x64" }
          - { label: "linux-arm64",  flag: "bun-linux-arm64",  out: "mcp-shell-bun-linux-arm64" }
          - { label: "darwin-x64",   flag: "bun-darwin-x64",   out: "mcp-shell-bun-darwin-x64" }
          - { label: "darwin-arm64", flag: "bun-darwin-arm64", out: "mcp-shell-bun-darwin-arm64" }
          - { label: "windows-x64",  flag: "bun-windows-x64",  out: "mcp-shell-bun-windows-x64.exe" }
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.1" }

      - name: Install deps
        run: bun install

      - name: Compile
        run: |
          mkdir -p dist
          bun build src/index.ts --compile --target=${{ matrix.target.flag }} --outfile dist/${{ matrix.target.out }}

      - name: Checksum
        run: |
          cd dist
          sha256sum ${{ matrix.target.out }} > ${{ matrix.target.out }}.sha256 || \
            shasum -a 256 ${{ matrix.target.out }} > ${{ matrix.target.out }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.out }}
          path: |
            dist/${{ matrix.target.out }}
            dist/${{ matrix.target.out }}.sha256

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts, merge-multiple: true }
      - run: ls -lah artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
